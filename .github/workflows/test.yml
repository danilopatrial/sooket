name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch/PR to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false # let every OS report; don't cancel siblings on one failure
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      # sharp has no prebuilt binary for Node 26+; skip its install script and
      # let it fall back to the WebAssembly path. All other native packages
      # (onnxruntime-node, etc.) are rebuilt normally in the second step.
      - run: npm ci --ignore-scripts
      - run: npm rebuild --ignore-scripts sharp

      - run: npm test

      - run: npm run lint

      - run: npm run build
